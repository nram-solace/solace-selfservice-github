
---
# ##############################################################
# nram-dev.yaml
# ##############################################################

# --------------------------------------------------------------
# Run parameters
# --------------------------------------------------------------
params:
  # this name should be in one of the inventory file under inventory/ folder
  tla-name: nram-poc
  # verbose mode
  verbose: false
  create:
    #- dmqueues
    # queues will auto create dmqueues
    - queues
    # client username will auto create client-profiles, acl-profiles
    #- client-usernames
    #- client-profiles
    #- acl-profiles
  # update is not supported yet
  update: null

# --------------------------------------------------------------
# User inputs
# --------------------------------------------------------------
inputs:
  # --------------------------------------------------------------
  # Queues
  #
  # list of DMQs
  # donnot override properties unless required
  dmqueues:
    - queueName: "#DEAD_MSG_QUEUE"
    - queueName: DMQ.NRAM.POC
  # list of queues
  # individual queues can override the properties here
  # subscriptions: can be added optionally
  queues:
    - queueName: NRAM.POC.Q1
      accessType: exclusive
      maxMsgSpoolUsage: 1234
      deadMsgQueue: DMQ.NRAM.POC
      subscriptions:
        - test/nram/dev/1
        - test/nram/dev/xyz/>
    - queueName: NRAM.POC.Q2


# --------------------------------------------------------------
# Defaults for all inputs
# --------------------------------------------------------------
defaults:
  queue:
    accessType: non-exclusive
    deadMsgQueue: "#DEAD_MSG_QUEUE"
    maxBindCount: 10
    maxDeliveredUnackedMsgsPerFlow: 1000
    maxMsgSize: 1000000
    maxMsgSpoolUsage: 1000
    maxRedeliveryCount: 2
    maxTtl: 0
    owner: solace-cloud-client
    permission: no-access
    redeliveryEnabled: true
    respectTtlEnabled: true
  dmqueue:
    accessType: exclusive
    maxMsgSpoolUsage: 999
  client-user:
    clientProfileName: default
    aclProfileName: default
  client-profile:
    allowBridgeConnectionsEnabled: false
    allowGuaranteedEndpointCreateEnabled: false
    allowGuaranteedMsgReceiveEnabled: false
    allowGuaranteedMsgSendEnabled: false
    allowSharedSubscriptionsEnabled: false
    allowTransactedSessionsEnabled: false
    maxConnectionCountPerClientUsername: 100
    maxEgressFlowCount: 100
    maxIngressFlowCount: 100
  acl-profile:
    clientConnectDefaultAction: disallow
    publishTopicDefaultAction: allow
    subscribeTopicDefaultAction: allow

# --------------------------------------------------------------
# System configuration
# DONOT CHANGE THESE
# --------------------------------------------------------------
system:
  configFile: config/system.yaml
