---
# ##############################################################
# Sample input file for creating queues with JNDI mapping
# using Solace self provision tool
# copy this file as input/<your-branch-name>.yaml and update the values
# ##############################################################

# --------------------------------------------------------------
# Run parameters
# --------------------------------------------------------------
params:
  # this name should be in one of the inventory file under inventory/ folder
  tla-name: nram-local
  # verbose mode
  verbose: false
  create:
    - queues
    #- dmqueues
    # queues will auto create dmqueues
    # client username will auto create client-profiles, acl-profiles
    #- client-usernames
    #- client-profiles
    #- acl-profiles

# --------------------------------------------------------------
# User inputs
# --------------------------------------------------------------
inputs:
  # --------------------------------------------------------------
  # Queues
  #
  # list of DMQs 
  # If there are DMQs, comment this section out.
  # DONOT override DMQ properties unless required
  dmqueues:
    - queueName: "#DEAD_MSG_QUEUE"
    - queueName: DMQ.Test01
  # list of queues
  # individual queues can override the properties here
  # subscriptions: can be added optionally
  queues:
    - queueName: Test.Q1
      # following will override the defaults
      accessType: exclusive
      maxMsgSpoolUsage: 1234
      deadMsgQueue: DMQ.Test01
      # list of subscriptions can  be added optionally
      subscriptions:
        - hello/world/>
        - howdy/>
    - queueName: Test.Q2
      subscriptions:
        - test/topic/1
        - test/topic/*
      # queue with no subscriptions
    - queueName: Test.Q3
      maxBindCount: 5
    # queue with no properties override or subscription
    - queueName: Test.Q4

# --------------------------------------------------------------
# Defaults for all inputs
# --------------------------------------------------------------
defaults:
  # override queue defaults as required
  queue:
    accessType: non-exclusive
    deadMsgQueue: "#DEAD_MSG_QUEUE"
    maxBindCount: 10
    maxDeliveredUnackedMsgsPerFlow: 1000
    maxMsgSize: 1000000
    maxMsgSpoolUsage: 1234
    maxRedeliveryCount: 2
    maxTtl: 60
    owner: test-user1
    permission: no-access
    redeliveryEnabled: true
    respectTtlEnabled: true
  # DO NOT override dmqueue properties unless required
  dmqueue:
    accessType: exclusive

# --------------------------------------------------------------
# System configuration
# DONOT CHANGE THESE
# --------------------------------------------------------------
system:
  configFile: config/system.yaml
