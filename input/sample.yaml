---
# --------------------------------------------------------------
# Run parameters
# --------------------------------------------------------------
params:
  application-id: nram-local-test
  verbose: false
  create:
    #- queues
    #- client-usernames
    #- client-profiles
    - acl-profiles
  update: null

# --------------------------------------------------------------
# User inputs
# --------------------------------------------------------------
inputs:
  # --------------------------------------------------------------
  # Queues
  #
  queues:
    - queueName: GitTest140
      accessType: exclusive
      maxMsgSpoolUsage: 1234
    - queueName: GitTest41
      subscriptions:
        - test/topic/1
        - test/topic/*
    - queueName: Git/Test42
      subscriptions:
        - test/>
  # --------------------------------------------------------------
  # Client Usernames
  #
  client-usernames:
    - clientUsername: git-test41
      aclProfileName: git-test41-acl
      clientProfileName: git-test41-profile
    - clientUsername: git-test42
      aclProfileName: git-test42-acl
      clientProfileName: git-test42-profile
    - clientUsername: git-test43
    - clientUsername: git-test44
  # --------------------------------------------------------------
  # Client Profiles
  #
  client-profiles:
    - clientProfileName: git-test41-profile
      allowBridgeConnectionsEnabled: true
      allowGuaranteedEndpointCreateEnabled: true
      allowGuaranteedMsgReceiveEnabled: true
      allowGuaranteedMsgSendEnabled: true
      allowSharedSubscriptionsEnabled: true
      allowTransactedSessionsEnabled: true
    - clientProfileName: git-test42-profile
      allowGuaranteedMsgReceiveEnabled: true
      allowGuaranteedMsgSendEnabled: true
    - clientProfileName: git-test3-profile
  # --------------------------------------------------------------
  # ACL Profiles
  #
  acl-profiles:
    - aclProfileName: git-test41-acl
      clientConnectDefaultAction: disallow
      clientConnectExceptions:
        - 10.10.0.0/24
        - 10.20.0.0/24
      publishTopicExceptions:
        - test/topic/1
        - test/topic/2
      subscribeTopicExceptions:
        - test/topic/sub/3
        - test/topic/sub/4
    - aclProfileName: git-test42-acl
      publishTopicDefaultAction: disallow
    - aclProfileName: git-test43-acl
    - aclProfileName: git-test44-acl

# --------------------------------------------------------------
# Defaults for all inputs
# --------------------------------------------------------------
defaults:
  queue:
    accessType: non-exclusive
    deadMsgQueue: "#DEAD_MSG_QUEUE"
    maxBindCount: 10
    maxDeliveredUnackedMsgsPerFlow: 1000
    maxMsgSize: 1000000
    maxMsgSpoolUsage: 1000
    maxRedeliveryCount: 2
    maxTtl: 0
    owner: solace-cloud-client
    permission: no-access
    redeliveryEnabled: true
    respectTtlEnabled: true
  dmqueue:
    accessType: exclusive
    deadMsgQueue: "#DEAD_MSG_QUEUE"
    maxBindCount: 1
    maxDeliveredUnackedMsgsPerFlow: 1000
    maxMsgSize: 1000000
    maxMsgSpoolUsage: 5000
    maxRedeliveryCount: 0
    maxTtl: 0
    owner: solace-cloud-client
    permission: no-access
    redeliveryEnabled: false
    respectTtlEnabled: false
    subscriptionTopic: ""
  client-user:
    clientProfileName: default
    aclProfileName: default
  client-profile:
    allowBridgeConnectionsEnabled: false
    allowGuaranteedEndpointCreateEnabled: false
    allowGuaranteedMsgReceiveEnabled: false
    allowGuaranteedMsgSendEnabled: false
    allowSharedSubscriptionsEnabled: false
    allowTransactedSessionsEnabled: false
    maxConnectionCountPerClientUsername: 100
    maxEgressFlowCount: 100
    maxIngressFlowCount: 100
  acl-profile:
    clientConnectDefaultAction: disallow
    publishTopicDefaultAction: allow
    subscribeTopicDefaultAction: allow

# --------------------------------------------------------------
# System configuration .. DONOT CHANGE
# --------------------------------------------------------------
system:
  configFile: config/system.yaml
