params:
  vpnName: default_local
  verbose: false
  create:
  - queues
inputs:
  queues:
  - accessType: exclusive
    deadMsgQueue: '#DEAD_MSG_QUEUE'
    maxBindCount: 10
    maxDeliveredUnackedMsgsPerFlow: 1000
    maxMsgSize: 1000000
    maxMsgSpoolUsage: 1000
    maxRedeliveryCount: 0
    maxTtl: 0
    owner: default
    permission: consume
    redeliveryEnabled: true
    respectTtlEnabled: true
    deliveryCountEnabled: true
    queueName: csv-test1
    msgVpnName: default
  - accessType: non-exclusive
    deadMsgQueue: '#DEAD_MSG_QUEUE'
    maxBindCount: 10
    maxDeliveredUnackedMsgsPerFlow: 1000
    maxMsgSize: 1000000
    maxMsgSpoolUsage: 2000
    maxRedeliveryCount: 0
    maxTtl: 0
    owner: default
    permission: read-only
    redeliveryEnabled: false
    respectTtlEnabled: true
    deliveryCountEnabled: true
    queueName: csv-test2
    subscriptions:
    - test/>
    - test2/*
    msgVpnName: default
  - accessType: exclusive
    deadMsgQueue: '#DEAD_MSG_QUEUE'
    maxBindCount: 10
    maxDeliveredUnackedMsgsPerFlow: 1000
    maxMsgSize: 1000000
    maxMsgSpoolUsage: 3000
    maxRedeliveryCount: 0
    maxTtl: 0
    owner: default
    permission: consume
    redeliveryEnabled: true
    respectTtlEnabled: true
    deliveryCountEnabled: false
    queueName: csv-test3
    subscriptions:
    - test3/*
    msgVpnName: default
defaults:
  queues:
    accessType: non-exclusive
    deadMsgQueue: '#DEAD_MSG_QUEUE'
    maxBindCount: 10
    maxDeliveredUnackedMsgsPerFlow: 1000
    maxMsgSize: 1000000
    maxMsgSpoolUsage: 1000
    maxRedeliveryCount: 0
    maxTtl: 0
    owner: default
    permission: no-access
    redeliveryEnabled: true
    respectTtlEnabled: true
    deliveryCountEnabled: true
system:
  configFile: config/system.yaml
