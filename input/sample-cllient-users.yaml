---
# ##############################################################
# Sample input file for provisioning list of client users with
# ACL and Client Profiles using Solace self provision tool 
# copy this file as input/<your-branch-name>.yaml and update the values
# ##############################################################

# --------------------------------------------------------------
# Run parameters
# --------------------------------------------------------------
params:
  # this name should be in one of the inventory file under inventory/ folder
  tla-name: nram-local
  # verbose mode
  verbose: false
  create:
    # client username will auto create client-profiles, acl-profiles
    - client-usernames
  # update is not supported yet
  #update: null

# --------------------------------------------------------------
# User inputs
# --------------------------------------------------------------
inputs:
  
  # --------------------------------------------------------------
  # Client Usernames
  #
  client-usernames:
    - clientUsername: test-user1
      aclProfileName: test-user1-acl
      clientProfileName: test-user1-profile
    - clientUsername: test-user2
      aclProfileName: test-user2-acl
      clientProfileName: test-user2-profile
    # the following will use the default acl and client profiles
    - clientUsername: test-user3
    - clientUsername: test-user4
  # --------------------------------------------------------------
  # Client Profiles
  #
  client-profiles:
      # all client profiles used above in client-username: should be defined here
    - clientProfileName: test-user1-profile
      # the following will override the defaults
      allowBridgeConnectionsEnabled: true
      allowGuaranteedEndpointCreateEnabled: true
      allowGuaranteedMsgReceiveEnabled: true
      allowGuaranteedMsgSendEnabled: true
      allowSharedSubscriptionsEnabled: true
      allowTransactedSessionsEnabled: true
      # the following will use the defaults
    - clientProfileName: test-user2-profile
      # this is not used in client-usernames:, but you can create additional profiles
    - clientProfileName: test-test3-profile
  # --------------------------------------------------------------
  # ACL Profiles
  # Exceptions are optional and can be added to the profile
  acl-profiles:
    - aclProfileName: test-user1-acl
      # the following will override the defaults
      publishTopicDefaultAction: allow
      subscribeTopicDefaultAction: allow
      # list of exceptions can be added
      # make sure they are valid CIDRs or topics
      clientConnectExceptions:
        - 10.10.0.0/24
        - 10.20.0.0/24
      publishTopicExceptions:
        - test/topic/1
        - test/topic/2
      subscribeTopicExceptions:
        - test/topic/sub/3
        - test/topic/sub/4
      # following will use defaults
    - aclProfileName: test-user2-acl
    # following not used in the client-username
    # but you can create additional profiles here
    - aclProfileName: test-test3-acl

# --------------------------------------------------------------
# Defaults for all inputs
# The following defaults will be applied to all inputs above
# any property can also be overridden in the individual input above
# any property not in the defaults below or the override above will use Solace defaults
# --------------------------------------------------------------
defaults:
  client-user:
    clientProfileName: default
    aclProfileName: default
  client-profile:
    allowBridgeConnectionsEnabled: false
    allowGuaranteedEndpointCreateEnabled: false
    allowGuaranteedMsgReceiveEnabled: false
    allowGuaranteedMsgSendEnabled: false
    allowSharedSubscriptionsEnabled: false
    allowTransactedSessionsEnabled: false
    maxConnectionCountPerClientUsername: 100
    maxEgressFlowCount: 100
    maxIngressFlowCount: 100
  acl-profile:
    clientConnectDefaultAction: disallow
    publishTopicDefaultAction: disallow
    subscribeTopicDefaultAction: disallow

# --------------------------------------------------------------
# System configuration
# DONOT CHANGE THESE
# --------------------------------------------------------------
system:
  configFile: config/system.yaml
