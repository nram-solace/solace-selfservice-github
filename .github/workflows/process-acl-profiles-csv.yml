name: Process ACL Profiles CSV

on:
  push:
    paths:
      - 'input/csv/**/acl-profiles.csv'
      - 'input/csv/acl-profiles.csv'  # Backward compatibility (flat/legacy)
  workflow_dispatch:
    inputs:
      csv_file:
        description: 'Path to CSV file (e.g., input/csv/team1/acl-profiles.csv)'
        required: true
        default: 'input/csv/acl-profiles.csv'

jobs:
  process_acl_profiles:
    runs-on: ubuntu-latest
    name: Process ACL Profiles

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests pyyaml

      - name: Determine CSV file path
        id: csv_path
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            CSV_FILE="${{ github.event.inputs.csv_file }}"
          else
            # Find changed ACL profile CSV files in this push
            CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD | grep -E 'input/csv/.*acl-profiles\.csv$' || true)
            if [ -z "$CHANGED_FILES" ]; then
              CSV_FILE="input/csv/acl-profiles.csv"
            else
              CSV_FILE=$(echo "$CHANGED_FILES" | head -n1)
            fi
          fi
          echo "CSV_FILE=$CSV_FILE" >> $GITHUB_ENV
          echo "Processing: $CSV_FILE"

      - name: Extract team name from path
        id: extract_team
        run: |
          if [[ "${{ env.CSV_FILE }}" =~ input/csv/([^/]+)/acl-profiles\.csv ]]; then
            TEAM_NAME="${BASH_REMATCH[1]}"
            echo "TEAM=$TEAM_NAME" >> $GITHUB_ENV
            echo "Team identified: $TEAM_NAME"
          else
            echo "TEAM=default" >> $GITHUB_ENV
            echo "Using default team (legacy flat path)"
          fi

      - name: Run solace_self_service.sh
        run: |
          echo "Processing ACL profiles for team: ${{ env.TEAM }}"
          echo "CSV file: ${{ env.CSV_FILE }}"
          bash scripts/solace_self_service.sh --csv-file ${{ env.CSV_FILE }} --verbose
        env:
          SEMP_PASSWORD: ${{ secrets.SEMP_PASSWORD }}

      - name: Summary
        run: |
          echo "## ACL Profiles Processed Successfully" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Team**: ${{ env.TEAM }}" >> $GITHUB_STEP_SUMMARY
          echo "- **File**: ${{ env.CSV_FILE }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
