name: Process Queues CSV

on:
  push:
    branches: [main]
    paths:
      - 'input/csv/**/queues-*.csv'
  workflow_dispatch:
    inputs:
      csv_file:
        description: 'Path to CSV file (e.g., input/csv/team1/queues-dev.csv)'
        required: true
        default: 'input/csv/sample/queues-dev.csv'
      environment:
        description: 'Target environment (e.g., dev, uat, prod)'
        required: true
        type: string

jobs:
  process_queues:
    runs-on: ubuntu-latest
    name: Process Queues

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests pyyaml

      - name: Detect CSV files to process
        id: detect_files
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "Trigger: push — detecting changed queue CSV files"
            FILES=$(git diff --name-only --diff-filter=ACM HEAD~1 | grep -E 'input/csv/[^/]+/queues-[^/]+\.csv$' || true)
            if [ -z "$FILES" ]; then
              echo "No queue CSV files changed in this push"
              echo "SKIP=true" >> $GITHUB_ENV
            else
              echo "Changed files:"
              echo "$FILES"
              echo "FILES<<EOF" >> $GITHUB_ENV
              echo "$FILES" >> $GITHUB_ENV
              echo "EOF" >> $GITHUB_ENV
              echo "SKIP=false" >> $GITHUB_ENV
            fi
          else
            echo "Trigger: workflow_dispatch"
            echo "FILES=${{ github.event.inputs.csv_file }}" >> $GITHUB_ENV
            echo "DISPATCH_ENV=${{ github.event.inputs.environment }}" >> $GITHUB_ENV
            echo "SKIP=false" >> $GITHUB_ENV
          fi

      - name: Process queue CSV files
        if: env.SKIP != 'true'
        run: |
          while IFS= read -r CSV_FILE; do
            [ -z "$CSV_FILE" ] && continue

            # Extract team from path
            if [[ "$CSV_FILE" =~ input/csv/([^/]+)/queues(-[^/]+)?\.csv ]]; then
              TEAM="${BASH_REMATCH[1]}"
            else
              TEAM="default"
            fi

            # Extract environment from filename
            if [ -n "$DISPATCH_ENV" ]; then
              ENV="$DISPATCH_ENV"
            else
              BASENAME=$(basename "$CSV_FILE" .csv)
              ENV="${BASENAME#queues-}"
            fi

            echo "========================================="
            echo "Processing: $CSV_FILE"
            echo "  Team: $TEAM"
            echo "  Environment: $ENV"
            echo "========================================="
            bash scripts/solace_self_service.sh --csv-file "$CSV_FILE" --env "$ENV" --verbose
          done <<< "$FILES"
        env:
          SEMP_PASSWORD: ${{ secrets.SEMP_PASSWORD }}

      - name: Summary
        if: env.SKIP != 'true'
        run: |
          echo "## Queues Processed Successfully" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Trigger**: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Files**:" >> $GITHUB_STEP_SUMMARY
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            echo "  - \`$f\`" >> $GITHUB_STEP_SUMMARY
          done <<< "$FILES"
          echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
