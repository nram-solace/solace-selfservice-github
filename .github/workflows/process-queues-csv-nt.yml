name: Process Queues CSV (NT)

on:
  push:
    branches: [dev, int, sys, uat, prod]
    paths:
      - 'input/csv/NT/**/queues-*.csv'
  workflow_dispatch:
    inputs:
      csv_file:
        description: 'Path to CSV file (e.g., input/csv/<client>/<env>/queues-<app>.csv)'
        required: true
        default: 'input/csv/sample/dev/queues-team1.csv'

jobs:
  process_queues:
    runs-on: [ self-hosted, enterprise, docker, Linux ]
    container:
      image: ghcr.io/northerntrust-internal/ghe/python:3.9  
    
    name: Process Queues

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests pyyaml # cryptography

      - name: Detect CSV files to process
        id: detect_files
        shell: bash
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "Trigger: push — detecting changed queue CSV files"
            BEFORE="${{ github.event.before }}"
            SHA="${{ github.sha }}"
            # Try diff against before-SHA first; fall back to HEAD~1 if before is all-zeros (force push / new branch)
            if [ "$BEFORE" = "0000000000000000000000000000000000000000" ] || [ -z "$BEFORE" ]; then
              echo "No previous commit (new branch or force push) — scanning HEAD for queue CSV files"
              FILES=$(git diff-tree --no-commit-id -r --name-only --diff-filter=ACMR "$SHA" | grep -E 'input/csv/NT/.+/queues-[^/]+\.csv$' || true)
            else
              FILES=$(git diff --name-only --diff-filter=ACMR "$BEFORE" "$SHA" | grep -E 'input/csv/NT/.+/queues-[^/]+\.csv$' || true)
            fi
            if [ -z "$FILES" ]; then
              echo "No queue CSV files changed in this push"
              echo "SKIP=true" >> $GITHUB_ENV
            else
              echo "Changed files:"
              echo "$FILES"
              echo "FILES<<EOF" >> $GITHUB_ENV
              echo "$FILES" >> $GITHUB_ENV
              echo "EOF" >> $GITHUB_ENV
              echo "SKIP=false" >> $GITHUB_ENV
            fi
          else
            echo "Trigger: workflow_dispatch"
            echo "FILES=${{ github.event.inputs.csv_file }}" >> $GITHUB_ENV
            echo "SKIP=false" >> $GITHUB_ENV
          fi

      - name: Process queue CSV files
        if: env.SKIP != 'true'
        shell: bash
        run: |
          while IFS= read -r CSV_FILE; do
            [ -z "$CSV_FILE" ] && continue

            # Path layout: input/csv/<client>/<env>/queues-<app>.csv
            ENV=$(basename "$(dirname "$CSV_FILE")")
            BASENAME=$(basename "$CSV_FILE" .csv)
            APP="${BASENAME#queues-}"

            # Branch/env consistency guard: on push, the env directory must match
            # the deploy branch so a wrong-env CSV cannot provision the wrong broker.
            if [ "${{ github.event_name }}" = "push" ] && [ "$ENV" != "${{ github.ref_name }}" ]; then
              echo "::warning::Skipping $CSV_FILE — env '$ENV' does not match branch '${{ github.ref_name }}'"
              continue
            fi

            echo "========================================="
            echo "Processing: $CSV_FILE"
            echo "  App: $APP"
            echo "  Environment: $ENV"
            echo "========================================="
            bash scripts/solace_self_service.sh --csv-file "$CSV_FILE" --env "$ENV" --verbose
          done <<< "$FILES"
        env:
          # Per-env password: yaml_to_semp.py prefers SEMP_<ENV>_PASSWORD,
          # falling back to SEMP_PASSWORD. Undefined secrets resolve to "".
          SEMP_PASSWORD: ${{ secrets.SEMP_PASSWORD }}
          SEMP_DEV_PASSWORD: ${{ secrets.SEMP_DEV_PASSWORD }}
          SEMP_INT_PASSWORD: ${{ secrets.SEMP_INT_PASSWORD }}
          SEMP_SYS_PASSWORD: ${{ secrets.SEMP_SYS_PASSWORD }}
          SEMP_UAT_PASSWORD: ${{ secrets.SEMP_UAT_PASSWORD }}
          SEMP_PROD_PASSWORD: ${{ secrets.SEMP_PROD_PASSWORD }}
          PASSWORD_ENC_KEY: ${{ secrets.PASSWORD_ENC_KEY }}

      - name: Summary
        if: env.SKIP != 'true'
        shell: bash
        run: |
          echo "## Queues Processed Successfully" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Trigger**: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Files**:" >> $GITHUB_STEP_SUMMARY
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            echo "  - \`$f\`" >> $GITHUB_STEP_SUMMARY
          done <<< "$FILES"
          echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
