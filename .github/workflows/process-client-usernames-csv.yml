name: Process Client Usernames CSV

on:
  push:
    branches: [dev, int, sys, uat, prod]
    paths:
      - 'input/csv/**/client-usernames-*.csv'
      - 'input/csv/**/client-profiles-*.csv'
  workflow_dispatch:
    inputs:
      csv_dir:
        description: 'Path to env CSV directory (e.g., input/csv/<client>/<env>)'
        required: true
        default: 'input/csv/sample/dev'
      app:
        description: 'Application name (e.g., team1)'
        required: true
        type: string

jobs:
  process_client_usernames:
    runs-on: ubuntu-latest
    name: Process Client Usernames

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests pyyaml cryptography

      - name: Detect files to process
        id: detect_files
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "Trigger: push — detecting changed client CSV files"
            FILES=$(git diff --name-only --diff-filter=ACMR HEAD~1 | grep -E 'input/csv/.+/(client-usernames|client-profiles)-[^/]+\.csv$' || true)
            if [ -z "$FILES" ]; then
              echo "No client CSV files changed in this push"
              echo "SKIP=true" >> $GITHUB_ENV
            else
              echo "Changed files:"
              echo "$FILES"
              # Deduplicate by (dir, app) pairs
              # Path layout: input/csv/<client>/<env>/<object>-<app>.csv
              PAIRS=$(echo "$FILES" | while IFS= read -r f; do
                DIR=$(dirname "$f")
                BASENAME=$(basename "$f" .csv)
                APP="${BASENAME#client-usernames-}"
                APP="${APP#client-profiles-}"
                echo "${DIR}|${APP}"
              done | sort -u)
              echo "Unique (dir, app) pairs:"
              echo "$PAIRS"
              echo "PAIRS<<EOF" >> $GITHUB_ENV
              echo "$PAIRS" >> $GITHUB_ENV
              echo "EOF" >> $GITHUB_ENV
              echo "SKIP=false" >> $GITHUB_ENV
            fi
          else
            echo "Trigger: workflow_dispatch"
            echo "PAIRS=${{ github.event.inputs.csv_dir }}|${{ github.event.inputs.app }}" >> $GITHUB_ENV
            echo "SKIP=false" >> $GITHUB_ENV
          fi

      - name: Process client username dependency chains
        if: env.SKIP != 'true'
        run: |
          while IFS= read -r PAIR; do
            [ -z "$PAIR" ] && continue
            CSV_DIR="${PAIR%%|*}"
            APP="${PAIR##*|}"

            # Extract env: the leaf dir of the CSV directory
            # (input/csv/<client>/<env> -> <env>).
            ENV=$(basename "$CSV_DIR")

            # Branch/env consistency guard: on push, the env directory must match
            # the deploy branch so a wrong-env CSV cannot provision the wrong broker.
            if [ "${{ github.event_name }}" = "push" ] && [ "$ENV" != "${{ github.ref_name }}" ]; then
              echo "::warning::Skipping $CSV_DIR — env '$ENV' does not match branch '${{ github.ref_name }}'"
              continue
            fi

            echo "========================================="
            echo "Processing dependency chain"
            echo "  Directory: $CSV_DIR"
            echo "  App: $APP"
            echo "  Environment: $ENV"
            echo "========================================="

            # Step 1: ACL profiles (dependency)
            ACL_FILE="${CSV_DIR}/acl-profiles-${APP}.csv"
            if [ -f "$ACL_FILE" ]; then
              echo "Processing ACL profiles: $ACL_FILE"
              bash scripts/solace_self_service.sh --csv-file "$ACL_FILE" --env "$ENV" --verbose
            else
              echo "No ACL profiles CSV found at $ACL_FILE, skipping"
            fi

            # Step 2: Client profiles (dependency)
            CP_FILE="${CSV_DIR}/client-profiles-${APP}.csv"
            if [ -f "$CP_FILE" ]; then
              echo "Processing client profiles: $CP_FILE"
              bash scripts/solace_self_service.sh --csv-file "$CP_FILE" --env "$ENV" --verbose
            else
              echo "No client profiles CSV found at $CP_FILE, skipping"
            fi

            # Step 3: Client usernames
            CU_FILE="${CSV_DIR}/client-usernames-${APP}.csv"
            if [ -f "$CU_FILE" ]; then
              echo "Processing client usernames: $CU_FILE"
              bash scripts/solace_self_service.sh --csv-file "$CU_FILE" --env "$ENV" --verbose
            else
              echo "No client usernames CSV found at $CU_FILE, skipping"
            fi
          done <<< "$PAIRS"
        env:
          # Per-env password: yaml_to_semp.py prefers SEMP_<ENV>_PASSWORD,
          # falling back to SEMP_PASSWORD. Undefined secrets resolve to "".
          SEMP_PASSWORD: ${{ secrets.SEMP_PASSWORD }}
          SEMP_DEV_PASSWORD: ${{ secrets.SEMP_DEV_PASSWORD }}
          SEMP_INT_PASSWORD: ${{ secrets.SEMP_INT_PASSWORD }}
          SEMP_SYS_PASSWORD: ${{ secrets.SEMP_SYS_PASSWORD }}
          SEMP_UAT_PASSWORD: ${{ secrets.SEMP_UAT_PASSWORD }}
          SEMP_PROD_PASSWORD: ${{ secrets.SEMP_PROD_PASSWORD }}
          PASSWORD_ENC_KEY: ${{ secrets.PASSWORD_ENC_KEY }}

      - name: Summary
        if: env.SKIP != 'true'
        run: |
          echo "## Client Usernames Processed Successfully" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Trigger**: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Processed**:" >> $GITHUB_STEP_SUMMARY
          while IFS= read -r p; do
            [ -z "$p" ] && continue
            DIR="${p%%|*}"
            APP="${p##*|}"
            echo "  - \`$DIR\` (app: \`$APP\`)" >> $GITHUB_STEP_SUMMARY
          done <<< "$PAIRS"
          echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
