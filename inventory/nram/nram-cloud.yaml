# Sample inventory file for the Solace Cloud environment
# Solace router and access info for the application
# sempPassword is read from the environment variable
# In GitHub Actions, set SEMP_PASSWORD in Secrets/Action/Secrets  

---
inventory:
    hosts:
    # environment matches the --env value used on the command line
    - environment: "nram-dev"
      host: "aks-poc2"
      sempUrl: "https://nram-poc2.messaging.solace.cloud:943"
      sempUser: "aks-poc2-admin"
      #sempPassword: "secret" # read from env
      vpn: "aks-poc2"
      
    - environment: "nram-dev1"
      host: "sc-nram-dev1"
      sempUrl: "https://nram-dev1.messaging.solace.cloud:943"
      sempUser: "nram-dev1-admin"
      
    - environment: "nram-poc"
      host: "aks-poc2"
      sempUrl: "https://nram-poc2.messaging.solace.cloud:943"
      sempUser: "aks-poc2-admin"
      #sempPassword: "secret" # read from env
      vpn: "aks-poc2"

    - environment: "nram-test"
      host: "sc-nram-test"
      sempUrl: "https://nram-test1.messaging.solace.cloud:943"
      sempUser: "nram-test-admin"
      #sempPassword: "secret" # read from env
      vpn: "nram-test"

    - environment: "nram-dev2"
      host: "sc-nram-dev2"
      sempUrl: "https://nram-dev2.messaging.solace.cloud:943"
      sempUser: "nram-ohio-vpn-admin"
      #sempPassword: "secret" # read from env
      vpn: "nram-ohio-vpn"
