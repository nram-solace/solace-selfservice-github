# Solace router and access info for team1
# The --env CLI parameter selects which host entry to target.

---
inventory:
    hosts:
    # environment matches the --env value used on the command line
    - environment: "dev"
      host: "localhost"
      sempUrl: "http://localhost:8080"
      sempUser: "admin"
      vpn: "test1-dev-vpn"

    - environment: "uat"
      host: "localhost"
      sempUrl: "http://localhost:8080"
      sempUser: "admin"
      vpn: "test1-uat-vpn"
