# Sample inventory file for the Solace Cloud environment
# Solace router and access info for the application
# sempPassword is read from the environment variable
# In GitHub Actions, set SEMP_PASSWORD in Secrets/Action/Secrets  

---
inventory:
    # all hosts in the inventory file are in the same environment
    environment: "test"
    hosts:
    # env + name is a unique string across all inventory files
    # this will be used in the input/default.yaml file to reference the host
    - name: "nram-dev"
      host: "cl"
      sempUrl: "https://mr-connection-xoqmdwtfgbe.messaging.solace.cloud:943"
      sempUser: "nram-dev1-admin"
      #sempPassword: "secret" # read from env
      vpn: "nram-dev1"


    - name: "nram-test"
      host: "nram-cloud-test1"
      sempUrl: "https://mr-connection-qje1n0vs317.messaging.solace.cloud:943"
      sempUser: "nram-test-admin"
      #sempPassword: "secret" # read from env
      vpn: "nram-test"

    - name: "nram-"
      host: "nram-cloud-dev2"
      sempUrl: "https://mr-connection-fi0j746itqx.messaging.solace.cloud:943"
      sempUser: "nram-ohio-vpn-admin"
      #sempPassword: "secret" # read from env
      vpn: "nram-ohio-vpn"
