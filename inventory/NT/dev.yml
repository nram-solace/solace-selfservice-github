# Solace router and access info for NT - dev environment
# One inventory file per environment: inventory/<client>/<env>.yml
# Each entry is keyed on "app" (application name / TLA). The env comes from the file name.
#
# Password: SEMP_DEV_PASSWORD or SEMP_PASSWORD env var at runtime (CI/CD),
# or add sempPassword/sempPasswordEnc per entry.

---
inventory:
    hosts:
    - app: "sample-tla"
      host: "localhost"
      sempUrl: "http://localhost:8080"
      sempUser: "admin"
      vpn: "default"
