# Solace router and access info for the nram-cloud team
# The --env CLI parameter selects which environment to target (dev, sys).
#
# Password options (in priority order):
#   1. SEMP_PASSWORD env var (overrides everything, for CI/CD)
#   2. sempPasswordEnc: encrypted password in this file (requires 'cryptography' pip package)
#   3. sempPassword: plaintext password in this file (for local dev only)
#   4. If none set, script exits with error
#
# To generate an encrypted password:
#   pip install cryptography
#   python3 scripts/crypto_utils.py --encrypt-string "your-password"

---
inventory:
    hosts:
    # environment matches the --env value used on the command line

    - environment: "dev"
      host: "nramtest.messaging.solace.cloud"
      sempUrl: "https://nramtest.messaging.solace.cloud:943"
      sempUser: "nram-dt-test-admin"
      vpn: "nram-dt-test"

    - environment: "int"
      host: "nramtest.messaging.solace.cloud"
      sempUrl: "https://nramtest.messaging.solace.cloud:943"
      sempUser: "nram-dt-test-admin"
      vpn: "nram-dt-test"

    - environment: "sys"
      host: "nram-gke-poc.messaging.solace.cloud"
      sempUrl: "https://nram-gke-poc.messaging.solace.cloud:943"
      sempUser: "nram-prod1-admin"
      vpn: "nram-prod1"

    - environment: "uat"
      host: "nram-gke-poc.messaging.solace.cloud"
      sempUrl: "https://nram-gke-poc.messaging.solace.cloud:943"
      sempUser: "nram-prod1-admin"
      vpn: "nram-prod1"

    - environment: "prod"
      host: "nram-gke-poc.messaging.solace.cloud"
      sempUrl: "https://nram-gke-poc.messaging.solace.cloud:943"
      sempUser: "nram-prod1-admin"
      vpn: "nram-prod1"