# Solace router and access info for sample team
# The --env CLI parameter selects which environment to target.
#
# Password options (in priority order):
#   1. SEMP_PASSWORD env var (overrides everything, for CI/CD)
#   2. sempPasswordEnc: encrypted password in this file (requires 'cryptography' pip package)
#   3. sempPassword: plaintext password in this file (for local dev only)
#   4. If none set, script exits with error
#
# To generate an encrypted password:
#   pip install cryptography
#   python3 scripts/crypto_utils.py --encrypt-string "your-password"
#
# To use a custom encryption key (must be set at runtime too):
#   export PASSWORD_ENC_KEY="your-secret-key"
#   python3 scripts/crypto_utils.py --encrypt-string "your-password"

---
inventory:
    hosts:
    # name matches the --env value used on the command line

    # Example with encrypted password (recommended for shared/production use)
    # The value below is "admin" encrypted with default key
    - name: "dev"
      host: "localhost"
      sempUrl: "http://localhost:8080"
      sempUser: "admin"
      sempPasswordEnc: "Z0FBQUFBQnBsUEZOeU9CVFdaTGRNZmhvdG9Cam1TWGIzRFNwVEdVMkxQQ0hxLXpZNTZnZmMwcmZYbWFlUFp3cGZVOS14TF9BSmxhdW42NnEyUW9ia2gtVkhiNmpfbTdpWkE9PQ=="
      vpn: "default"

    # Example with plaintext password (for local dev only)
    - name: "uat"
      host: "localhost"
      sempUrl: "http://localhost:8080"
      sempUser: "admin"
      sempPassword: "admin"
      vpn: "default"
    
    # Example that relies on SEMP_PASSWORD env var at runtime (recommended for CI/CD pipelines)
    - name: "prod"
      host: "localhost"
      sempUrl: "http://localhost:8080"
      sempUser: "admin"
      #sempPassword: "admin"
      vpn: "default"
