# Solace router and access info for team1
# The --env CLI parameter selects which host entry to target.

---
inventory:
    hosts:
    # name matches the --env value used on the command line
    - name: "dev"
      host: "localhost"
      sempUrl: "http://localhost:8080"
      sempUser: "admin"
      vpn: "test1-dev-vpn"

    - name: "uat"
      host: "localhost"
      sempUrl: "http://localhost:8080"
      sempUser: "admin"
      vpn: "test1-uat-vpn"
